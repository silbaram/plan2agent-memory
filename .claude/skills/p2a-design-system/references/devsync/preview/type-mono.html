<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<title>Mono in use</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body {
    background: var(--ds-bg-1);
    padding: 20px;
    box-sizing: border-box;
    color: var(--ds-fg-1);
    font-family: var(--ds-font-sans);
  }
  *, *::before, *::after { box-sizing: border-box; }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .swatch {
    border-radius: var(--ds-radius-sm);
    border: 1px solid var(--ds-border-1);
    overflow: hidden;
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    height: 88px;
  }
  .swatch .lbl {
    padding: 6px 8px;
    font-family: var(--ds-font-mono);
    font-size: 10px;
    color: var(--ds-fg-1);
    background: rgba(15,23,42,0.55);
    backdrop-filter: blur(4px);
    display: flex;
    justify-content: space-between;
    line-height: 1.3;
  }
  [data-theme="light"] .swatch .lbl { background: rgba(255,255,255,0.7); color: var(--ds-fg-1); border-top: 1px solid var(--ds-border-1); }
  .scale { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; }
</style>
</head>
<body>

<div style="display:flex; flex-direction: column; gap: 8px;">
  <div style="font-family: var(--ds-font-mono); font-size: 13px; color: var(--ds-fg-1);">
    <span style="color: var(--ds-syntax-comment);">// Geist Mono — branches, SHAs, paths, numbers</span>
  </div>
  <div style="font-family: var(--ds-font-mono); font-size: 13px; color: var(--ds-fg-1);">
    <span style="color: var(--ds-syntax-keyword);">const</span> result = <span style="color: var(--ds-syntax-fn);">useSync</span>(<span style="color: var(--ds-syntax-string);">'main'</span>, { retry: <span style="color: var(--ds-syntax-number);">3</span> });
  </div>
  <div style="display: flex; gap: 24px; align-items: baseline; padding-top: 6px;">
    <div>
      <div style="font-family: var(--ds-font-sans); font-size: 10px; color: var(--ds-fg-3); text-transform: uppercase; letter-spacing: 0.04em;">Tabular nums</div>
      <div style="font-family: var(--ds-font-mono); font-variant-numeric: tabular-nums; font-size: 16px; color: var(--ds-fg-1); margin-top: 2px;">1,284,392</div>
    </div>
    <div>
      <div style="font-family: var(--ds-font-sans); font-size: 10px; color: var(--ds-fg-3); text-transform: uppercase; letter-spacing: 0.04em;">Branch</div>
      <div style="font-family: var(--ds-font-mono); font-size: 13px; color: var(--ds-fg-1); margin-top: 2px;">feat/auth-flow</div>
    </div>
    <div>
      <div style="font-family: var(--ds-font-sans); font-size: 10px; color: var(--ds-fg-3); text-transform: uppercase; letter-spacing: 0.04em;">SHA</div>
      <div style="font-family: var(--ds-font-mono); font-size: 13px; color: var(--ds-fg-1); margin-top: 2px;">a3f9c12</div>
    </div>
    <div>
      <div style="font-family: var(--ds-font-sans); font-size: 10px; color: var(--ds-fg-3); text-transform: uppercase; letter-spacing: 0.04em;">Shortcut</div>
      <div style="font-family: var(--ds-font-mono); font-size: 13px; color: var(--ds-fg-1); margin-top: 2px;">⌘ K · ⇧ ⌘ P</div>
    </div>
  </div>
</div>

</body>
</html>
