<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<title>Slate scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body {
    background: var(--ds-bg-1);
    padding: 20px;
    box-sizing: border-box;
    color: var(--ds-fg-1);
    font-family: var(--ds-font-sans);
  }
  *, *::before, *::after { box-sizing: border-box; }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .swatch {
    border-radius: var(--ds-radius-sm);
    border: 1px solid var(--ds-border-1);
    overflow: hidden;
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    height: 88px;
  }
  .swatch .lbl {
    padding: 6px 8px;
    font-family: var(--ds-font-mono);
    font-size: 10px;
    color: var(--ds-fg-1);
    background: rgba(15,23,42,0.55);
    backdrop-filter: blur(4px);
    display: flex;
    justify-content: space-between;
    line-height: 1.3;
  }
  [data-theme="light"] .swatch .lbl { background: rgba(255,255,255,0.7); color: var(--ds-fg-1); border-top: 1px solid var(--ds-border-1); }
  .scale { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; }
</style>
</head>
<body>

<div class="scale">

    <div class="swatch" style="background: var(--slate-50);">
      <div class="lbl"><span>50</span></div>
    </div>
    <div class="swatch" style="background: var(--slate-100);">
      <div class="lbl"><span>100</span></div>
    </div>
    <div class="swatch" style="background: var(--slate-200);">
      <div class="lbl"><span>200</span></div>
    </div>
    <div class="swatch" style="background: var(--slate-300);">
      <div class="lbl"><span>300</span></div>
    </div>
    <div class="swatch" style="background: var(--slate-400);">
      <div class="lbl"><span>400</span></div>
    </div>
    <div class="swatch" style="background: var(--slate-500);">
      <div class="lbl"><span>500</span></div>
    </div>
    <div class="swatch" style="background: var(--slate-600);">
      <div class="lbl"><span>600</span></div>
    </div>
    <div class="swatch" style="background: var(--slate-700);">
      <div class="lbl"><span>700</span></div>
    </div>
    <div class="swatch" style="background: var(--slate-800);">
      <div class="lbl"><span>800</span></div>
    </div>
    <div class="swatch" style="background: var(--slate-900);">
      <div class="lbl"><span>900</span></div>
    </div>
    <div class="swatch" style="background: var(--slate-950);">
      <div class="lbl"><span>950</span></div>
    </div>
</div>
<div style="margin-top: 10px; display:flex; justify-content: space-between; font-family: var(--ds-font-mono); font-size: 10px; color: var(--ds-fg-3);">
  <span>slate · neutral foundation · 95% of every surface</span>
  <span>--slate-50 → --slate-950</span>
</div>

</body>
</html>
