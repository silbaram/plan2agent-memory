<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<title>Empty state</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: var(--ds-bg-1); padding: 20px; box-sizing: border-box; color: var(--ds-fg-1); font-family: var(--ds-font-sans); }
  *, *::before, *::after { box-sizing: border-box; }
  .ico { width:16px;height:16px;flex-shrink:0; }
  .kbd { font-family: var(--ds-font-mono); font-size: 10px; background: var(--ds-bg-2); border: 1px solid var(--ds-border-2); border-radius: var(--ds-radius-xs); padding: 1px 5px; color: var(--ds-fg-3); }
</style>
</head>
<body>
<div style="display:flex; gap:16px;">
  <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:10px; padding:24px; background: var(--ds-bg-2); border:1px solid var(--ds-border-1); border-radius: var(--ds-radius-md);">
    <span style="width:36px;height:36px;border-radius:999px; background: var(--ds-bg-3); border:1px solid var(--ds-border-1); color:var(--ds-fg-3); display:inline-flex; align-items:center; justify-content:center;"><svg class="ico" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.45-6.89A2 2 0 0016.76 4H7.24a2 2 0 00-1.79 1.11z"/></svg></span>
    <div style="font-size:13px; font-weight:600; color: var(--ds-fg-1);">No open issues</div>
    <div style="font-size:12px; color: var(--ds-fg-3); max-width:220px; line-height:1.45;">No open issues match these filters.</div>
    <div style="display:flex; gap:8px; margin-top:2px;">
      <button style="height:24px; padding:0 8px; background:transparent; color: var(--ds-fg-2); border:none; font-size:12px; font-weight:500;">Clear filters</button>
      <button style="height:24px; padding:0 8px; background: var(--ds-accent-1); color:#fff; border:none; border-radius: var(--ds-radius-sm); font-size:12px; font-weight:500;">New issue</button>
    </div>
  </div>
  <div style="max-width:200px; padding-top:8px;">
    <div style="font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.04em; color:var(--ds-fg-3); margin-bottom:6px;">EMPTY STATE</div>
    <div style="font-size:12px; color: var(--ds-fg-2); line-height:1.5;">One monochrome glyph, one factual line, one action. No cartoon illustrations, no exclamation marks.</div>
  </div>
</div>
</body>
</html>
