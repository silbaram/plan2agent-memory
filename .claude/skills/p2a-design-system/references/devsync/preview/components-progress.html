<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<title>Progress</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body {
    background: var(--ds-bg-1);
    padding: 20px;
    box-sizing: border-box;
    color: var(--ds-fg-1);
    font-family: var(--ds-font-sans);
  }
  *, *::before, *::after { box-sizing: border-box; }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .swatch {
    border-radius: var(--ds-radius-sm);
    border: 1px solid var(--ds-border-1);
    overflow: hidden;
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    height: 88px;
  }
  .swatch .lbl {
    padding: 6px 8px;
    font-family: var(--ds-font-mono);
    font-size: 10px;
    color: var(--ds-fg-1);
    background: rgba(15,23,42,0.55);
    backdrop-filter: blur(4px);
    display: flex;
    justify-content: space-between;
    line-height: 1.3;
  }
  [data-theme="light"] .swatch .lbl { background: rgba(255,255,255,0.7); color: var(--ds-fg-1); border-top: 1px solid var(--ds-border-1); }
  .scale { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; }
</style>
</head>
<body>

<div style="display:flex; flex-direction: column; gap: 12px;">
  <div>
    <div style="display:flex; justify-content: space-between; margin-bottom: 6px;">
      <span style="font-size: 12px; color: var(--ds-fg-2);">Sprint 24 · velocity</span>
      <span style="font-family: var(--ds-font-mono); font-size: 11px; color: var(--ds-fg-2);">38 / 52 pts</span>
    </div>
    <div style="height: 6px; background: var(--ds-bg-3); border-radius: 999px; overflow: hidden;">
      <div style="width: 73%; height: 100%; background: var(--ds-accent-1); border-radius: 999px;"></div>
    </div>
  </div>
  <div>
    <div style="display:flex; justify-content: space-between; margin-bottom: 6px;">
      <span style="font-size: 12px; color: var(--ds-fg-2);">CI · 42 / 47 jobs passing</span>
      <span style="font-family: var(--ds-font-mono); font-size: 11px; color: var(--ds-fg-2);">89%</span>
    </div>
    <div style="height: 6px; background: var(--ds-bg-3); border-radius: 999px; overflow: hidden; display: flex;">
      <div style="flex: 42; background: var(--ds-success-1);"></div>
      <div style="flex: 3; background: var(--ds-danger-1);"></div>
      <div style="flex: 2; background: var(--ds-warning-1);"></div>
    </div>
  </div>
</div>

</body>
</html>
