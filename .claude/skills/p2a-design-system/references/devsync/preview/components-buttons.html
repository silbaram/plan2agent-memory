<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body {
    background: var(--ds-bg-1);
    padding: 20px;
    box-sizing: border-box;
    color: var(--ds-fg-1);
    font-family: var(--ds-font-sans);
  }
  *, *::before, *::after { box-sizing: border-box; }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .swatch {
    border-radius: var(--ds-radius-sm);
    border: 1px solid var(--ds-border-1);
    overflow: hidden;
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    height: 88px;
  }
  .swatch .lbl {
    padding: 6px 8px;
    font-family: var(--ds-font-mono);
    font-size: 10px;
    color: var(--ds-fg-1);
    background: rgba(15,23,42,0.55);
    backdrop-filter: blur(4px);
    display: flex;
    justify-content: space-between;
    line-height: 1.3;
  }
  [data-theme="light"] .swatch .lbl { background: rgba(255,255,255,0.7); color: var(--ds-fg-1); border-top: 1px solid var(--ds-border-1); }
  .scale { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; }
</style>
</head>
<body>

<div style="display:flex; flex-direction: column; gap: 12px;">
  <div style="display:flex; gap: 10px; align-items: center;">
    <button style="background: var(--ds-accent-1); color: #FFF; border-color: var(--ds-accent-1); height: 28px; padding: 0 12px; border-radius: var(--ds-radius-sm); font-family: var(--ds-font-sans); font-size: 13px; font-weight: 500; border: 1px solid transparent; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; line-height: 1; ">Create issue</button>
    <button style="background: var(--ds-bg-3); color: var(--ds-fg-1); border-color: var(--ds-border-2); height: 28px; padding: 0 12px; border-radius: var(--ds-radius-sm); font-family: var(--ds-font-sans); font-size: 13px; font-weight: 500; border: 1px solid transparent; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; line-height: 1; ">Cancel</button>
    <button style="background: transparent; color: var(--ds-fg-2); border-color: transparent; height: 28px; padding: 0 12px; border-radius: var(--ds-radius-sm); font-family: var(--ds-font-sans); font-size: 13px; font-weight: 500; border: 1px solid transparent; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; line-height: 1; ">Dismiss</button>
    <button style="background: var(--ds-danger-1); color: #FFF; border-color: var(--ds-danger-1); height: 28px; padding: 0 12px; border-radius: var(--ds-radius-sm); font-family: var(--ds-font-sans); font-size: 13px; font-weight: 500; border: 1px solid transparent; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; line-height: 1; ">Delete branch</button>
    <span style="font-family: var(--ds-font-mono); font-size: 10px; color: var(--ds-fg-3); margin-left: 8px;">default · 28px</span>
  </div>
  <div style="display:flex; gap: 10px; align-items: center;">
    <button style="background: var(--ds-accent-2); color: #FFF; border-color: var(--ds-accent-2); box-shadow: var(--ds-shadow-inset); height: 28px; padding: 0 12px; border-radius: var(--ds-radius-sm); font-family: var(--ds-font-sans); font-size: 13px; font-weight: 500; border: 1px solid transparent; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; line-height: 1; ">Hover</button>
    <button style="background: var(--ds-accent-3); color: #FFF; border-color: var(--ds-accent-3); height: 28px; padding: 0 12px; border-radius: var(--ds-radius-sm); font-family: var(--ds-font-sans); font-size: 13px; font-weight: 500; border: 1px solid transparent; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; line-height: 1; ">Pressed</button>
    <button style="background: var(--ds-bg-3); color: var(--ds-fg-4); border-color: var(--ds-border-1); cursor: not-allowed; height: 28px; padding: 0 12px; border-radius: var(--ds-radius-sm); font-family: var(--ds-font-sans); font-size: 13px; font-weight: 500; border: 1px solid transparent; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; line-height: 1; ">Disabled</button>
    <button style="background: var(--ds-accent-1); color: #FFF; border-color: var(--ds-accent-1); box-shadow: var(--ds-shadow-focus); height: 28px; padding: 0 12px; border-radius: var(--ds-radius-sm); font-family: var(--ds-font-sans); font-size: 13px; font-weight: 500; border: 1px solid transparent; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; line-height: 1; ">Focused</button>
    <span style="font-family: var(--ds-font-mono); font-size: 10px; color: var(--ds-fg-3); margin-left: 8px;">states</span>
  </div>
</div>

</body>
</html>
