<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<title>Text colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body {
    background: var(--ds-bg-1);
    padding: 20px;
    box-sizing: border-box;
    color: var(--ds-fg-1);
    font-family: var(--ds-font-sans);
  }
  *, *::before, *::after { box-sizing: border-box; }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .swatch {
    border-radius: var(--ds-radius-sm);
    border: 1px solid var(--ds-border-1);
    overflow: hidden;
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    height: 88px;
  }
  .swatch .lbl {
    padding: 6px 8px;
    font-family: var(--ds-font-mono);
    font-size: 10px;
    color: var(--ds-fg-1);
    background: rgba(15,23,42,0.55);
    backdrop-filter: blur(4px);
    display: flex;
    justify-content: space-between;
    line-height: 1.3;
  }
  [data-theme="light"] .swatch .lbl { background: rgba(255,255,255,0.7); color: var(--ds-fg-1); border-top: 1px solid var(--ds-border-1); }
  .scale { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; }
</style>
</head>
<body>

<div style="background: var(--ds-bg-2); border: 1px solid var(--ds-border-1); border-radius: var(--ds-radius-md); padding: 16px 20px; display:flex; flex-direction: column; gap: 6px;">
  <div style="display:flex; align-items: baseline; gap:14px;">
    <span style="color: var(--ds-fg-1); font-size: 15px; font-weight: 600;">Primary text · fg-1</span>
    <span style="font-family: var(--ds-font-mono); font-size: 10px; color: var(--ds-fg-3);">#F8FAFC</span>
  </div>
  <div style="display:flex; align-items: baseline; gap:14px;">
    <span style="color: var(--ds-fg-2); font-size: 13px;">Secondary text · fg-2 · body copy</span>
    <span style="font-family: var(--ds-font-mono); font-size: 10px; color: var(--ds-fg-3);">#CBD5E1</span>
  </div>
  <div style="display:flex; align-items: baseline; gap:14px;">
    <span style="color: var(--ds-fg-3); font-size: 12px;">Tertiary text · fg-3 · meta &amp; timestamps</span>
    <span style="font-family: var(--ds-font-mono); font-size: 10px; color: var(--ds-fg-3);">#94A3B8</span>
  </div>
  <div style="display:flex; align-items: baseline; gap:14px;">
    <span style="color: var(--ds-fg-4); font-size: 12px;">Disabled / placeholder · fg-4</span>
    <span style="font-family: var(--ds-font-mono); font-size: 10px; color: var(--ds-fg-3);">#64748B</span>
  </div>
</div>

</body>
</html>
