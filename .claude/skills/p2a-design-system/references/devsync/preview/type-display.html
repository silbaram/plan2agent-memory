<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<title>Display & headings</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body {
    background: var(--ds-bg-1);
    padding: 20px;
    box-sizing: border-box;
    color: var(--ds-fg-1);
    font-family: var(--ds-font-sans);
  }
  *, *::before, *::after { box-sizing: border-box; }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .swatch {
    border-radius: var(--ds-radius-sm);
    border: 1px solid var(--ds-border-1);
    overflow: hidden;
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    height: 88px;
  }
  .swatch .lbl {
    padding: 6px 8px;
    font-family: var(--ds-font-mono);
    font-size: 10px;
    color: var(--ds-fg-1);
    background: rgba(15,23,42,0.55);
    backdrop-filter: blur(4px);
    display: flex;
    justify-content: space-between;
    line-height: 1.3;
  }
  [data-theme="light"] .swatch .lbl { background: rgba(255,255,255,0.7); color: var(--ds-fg-1); border-top: 1px solid var(--ds-border-1); }
  .scale { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; }
</style>
</head>
<body>

<div style="display:flex; flex-direction: column; gap: 8px;">
  <div style="display:flex; align-items: baseline; gap: 16px;">
    <div class="ds-display" style="font-size: 36px;">Display</div>
    <span style="font-family: var(--ds-font-mono); font-size: 10px; color: var(--ds-fg-3);">48 / 600 / -0.02em</span>
  </div>
  <div style="display:flex; align-items: baseline; gap: 16px;">
    <div class="ds-h1" style="font-size: 28px;">Heading 1</div>
    <span style="font-family: var(--ds-font-mono); font-size: 10px; color: var(--ds-fg-3);">36 / 600 / -0.02em</span>
  </div>
  <div style="display:flex; align-items: baseline; gap: 16px;">
    <div class="ds-h2" style="font-size: 22px;">Heading 2</div>
    <span style="font-family: var(--ds-font-mono); font-size: 10px; color: var(--ds-fg-3);">28 / 600 / -0.01em</span>
  </div>
  <div style="display:flex; align-items: baseline; gap: 16px;">
    <div class="ds-h3" style="font-size: 18px;">Heading 3</div>
    <span style="font-family: var(--ds-font-mono); font-size: 10px; color: var(--ds-fg-3);">22 / 600</span>
  </div>
</div>

</body>
</html>
