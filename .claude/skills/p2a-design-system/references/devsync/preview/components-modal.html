<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<title>Modal / dialog</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: var(--ds-bg-1); padding: 0px; box-sizing: border-box; color: var(--ds-fg-1); font-family: var(--ds-font-sans); }
  *, *::before, *::after { box-sizing: border-box; }
  .ico { width:16px;height:16px;flex-shrink:0; }
  .kbd { font-family: var(--ds-font-mono); font-size: 10px; background: var(--ds-bg-2); border: 1px solid var(--ds-border-2); border-radius: var(--ds-radius-xs); padding: 1px 5px; color: var(--ds-fg-3); }
</style>
</head>
<body>
<div style="position:relative; border-radius: var(--ds-radius-md); overflow:hidden; border:1px solid var(--ds-border-1);">
  <!-- faux backdrop -->
  <div style="background: var(--ds-bg-1); padding:20px; min-height:200px;">
    <div style="height:8px; width:40%; background:var(--ds-bg-3); border-radius:4px; margin-bottom:10px;"></div>
    <div style="height:8px; width:70%; background:var(--ds-bg-3); border-radius:4px; margin-bottom:10px;"></div>
    <div style="height:8px; width:55%; background:var(--ds-bg-3); border-radius:4px;"></div>
  </div>
  <div style="position:absolute; inset:0; background: rgba(6,10,20,0.5); backdrop-filter: blur(3px); display:flex; align-items:center; justify-content:center;">
    <div style="width:380px; background: var(--ds-bg-2); border:1px solid var(--ds-border-2); border-radius: var(--ds-radius-md); box-shadow: var(--ds-shadow-lg); overflow:hidden;">
      <div style="display:flex; align-items:flex-start; gap:12px; padding:16px 18px;">
        <span style="width:32px;height:32px;flex-shrink:0;border-radius: var(--ds-radius-sm); background: var(--ds-danger-bg); border:1px solid var(--ds-danger-border); color:var(--ds-danger-1); display:inline-flex; align-items:center; justify-content:center;"><svg class="ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/><path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></span>
        <div style="flex:1;">
          <div style="font-size:15px; font-weight:600; color: var(--ds-fg-1);">Delete branch?</div>
          <div style="font-size:12px; color: var(--ds-fg-2); margin-top:4px; line-height:1.45;">This permanently deletes <span style="font-family:var(--ds-font-mono); color:var(--ds-fg-1);">feat/auth-flow</span> and its 3 unmerged commits. This can't be undone.</div>
        </div>
      </div>
      <div style="display:flex; justify-content:flex-end; gap:8px; padding:12px 18px; background: var(--ds-bg-1); border-top:1px solid var(--ds-border-1);">
        <button style="height:28px; padding:0 12px; background: var(--ds-bg-3); color: var(--ds-fg-1); border:1px solid var(--ds-border-2); border-radius: var(--ds-radius-sm); font-size:13px; font-weight:500;">Cancel</button>
        <button style="height:28px; padding:0 12px; background: var(--ds-danger-1); color:#fff; border:none; border-radius: var(--ds-radius-sm); font-size:13px; font-weight:500;">Delete branch</button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
