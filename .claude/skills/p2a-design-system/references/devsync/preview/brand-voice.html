<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<title>Voice</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body {
    background: var(--ds-bg-1);
    padding: 20px;
    box-sizing: border-box;
    color: var(--ds-fg-1);
    font-family: var(--ds-font-sans);
  }
  *, *::before, *::after { box-sizing: border-box; }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .swatch {
    border-radius: var(--ds-radius-sm);
    border: 1px solid var(--ds-border-1);
    overflow: hidden;
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    height: 88px;
  }
  .swatch .lbl {
    padding: 6px 8px;
    font-family: var(--ds-font-mono);
    font-size: 10px;
    color: var(--ds-fg-1);
    background: rgba(15,23,42,0.55);
    backdrop-filter: blur(4px);
    display: flex;
    justify-content: space-between;
    line-height: 1.3;
  }
  [data-theme="light"] .swatch .lbl { background: rgba(255,255,255,0.7); color: var(--ds-fg-1); border-top: 1px solid var(--ds-border-1); }
  .scale { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; }
</style>
</head>
<body>

<div style="display:grid; grid-template-columns: 1fr 1fr; gap: 12px;">
  <div style="background: var(--ds-bg-2); border: 1px solid var(--ds-success-border); border-radius: var(--ds-radius-md); padding: 14px 16px;">
    <div style="display:flex; align-items:center; gap:6px; margin-bottom: 8px;">
      <span style="width: 8px; height: 8px; background: var(--ds-success-1); border-radius: 999px;"></span>
      <span style="font-family: var(--ds-font-mono); font-size: 10px; color: var(--ds-success-fg); text-transform: uppercase; letter-spacing: 0.04em;">DEVSYNC</span>
    </div>
    <div style="font-size: 13px; color: var(--ds-fg-1); line-height: 1.45;">Build failed · <span style="font-family: var(--ds-font-mono); color: var(--ds-fg-3);">2m ago</span></div>
    <div style="font-size: 12px; color: var(--ds-fg-3); margin-top: 4px;">12 issues need triage</div>
    <div style="font-size: 12px; color: var(--ds-fg-3); margin-top: 4px;">Push rejected — branch protection requires 1 review.</div>
  </div>
  <div style="background: var(--ds-bg-2); border: 1px solid var(--ds-danger-border); border-radius: var(--ds-radius-md); padding: 14px 16px;">
    <div style="display:flex; align-items:center; gap:6px; margin-bottom: 8px;">
      <span style="width: 8px; height: 8px; background: var(--ds-danger-1); border-radius: 999px;"></span>
      <span style="font-family: var(--ds-font-mono); font-size: 10px; color: var(--ds-danger-fg); text-transform: uppercase; letter-spacing: 0.04em;">AVOID</span>
    </div>
    <div style="font-size: 13px; color: var(--ds-fg-2); line-height: 1.45;">🚨 Whoa, your build just broke!</div>
    <div style="font-size: 12px; color: var(--ds-fg-3); margin-top: 4px;">You've got 12 issues to triage 🎉</div>
    <div style="font-size: 12px; color: var(--ds-fg-3); margin-top: 4px;">Oops! Something went wrong. Please try again later.</div>
  </div>
</div>

</body>
</html>
