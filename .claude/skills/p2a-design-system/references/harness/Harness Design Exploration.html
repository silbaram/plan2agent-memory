<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>harness — design exploration</title>
  <link rel="stylesheet" href="design-system/harness.css" />
  <style>
    @keyframes harness-blink { 50% { opacity: 0; } }
    body { overflow: hidden; height: 100vh; background: #18170F; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="design-system/dot-character.jsx"></script>
  <script type="text/babel" src="design-system/mock-data.jsx"></script>
  <script type="text/babel" src="design-system/atoms.jsx"></script>
  <script type="text/babel" src="design-system/chrome.jsx"></script>
  <script type="text/babel" src="variations/v1-operator.jsx"></script>
  <script type="text/babel" src="variations/v2-console.jsx"></script>
  <script type="text/babel" src="variations/v3-roster.jsx"></script>
  <script type="text/babel" src="variations/v4-pipeline.jsx"></script>
  <script type="text/babel" src="variations/v5-companion.jsx"></script>
  <script type="text/babel" src="variations/v6-mosaic.jsx"></script>

  <script type="text/babel">
    const { DesignCanvas, DCSection, DCArtboard, HarnessChrome } = window;
    const { useTweaks, TweaksPanel, TweakSection, TweakSlider, TweakColor, TweakRadio, TweakToggle } = window;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accent": "#FF5B2E",
      "dotSize": 3,
      "showOperator": true,
      "showConsole": true,
      "showRoster": true,
      "showPipeline": true,
      "showCompanion": true,
      "showMosaic": true,
      "density": "comfy"
    }/*EDITMODE-END*/;

    function App() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

      // Live-apply accent
      React.useEffect(() => {
        document.documentElement.style.setProperty('--accent', tweaks.accent);
      }, [tweaks.accent]);

      return (
        <>
          <DesignCanvas>
            <DCSection id="ide" title="IDE-hybrid layouts" subtitle="VSCode/Zed-like — sidebar + main + inspector">
              {tweaks.showOperator && (
                <DCArtboard id="v1" label="01 · Operator — IDE 3-pane" width={1440} height={900}>
                  <HarnessChrome title="harness" subtitle="checkout-v2 · main" accent="var(--p-claude)">
                    <VarOperator />
                  </HarnessChrome>
                </DCArtboard>
              )}
              {tweaks.showConsole && (
                <DCArtboard id="v2" label="02 · Console — terminal-forward" width={1440} height={900}>
                  <HarnessChrome title="harness" subtitle="checkout-v2 · main" accent="var(--p-claude)">
                    <VarConsole />
                  </HarnessChrome>
                </DCArtboard>
              )}
            </DCSection>

            <DCSection id="overview" title="Multi-agent overview" subtitle="when you're running 3+ agents at once">
              {tweaks.showRoster && (
                <DCArtboard id="v3" label="03 · Roster — agent grid" width={1440} height={900}>
                  <HarnessChrome title="harness" subtitle="roster · checkout-v2" accent="var(--accent)">
                    <VarRoster />
                  </HarnessChrome>
                </DCArtboard>
              )}
              {tweaks.showPipeline && (
                <DCArtboard id="v4" label="04 · Pipeline — swim lanes" width={1440} height={900}>
                  <HarnessChrome title="harness" subtitle="pipeline · checkout-v2" accent="var(--accent)">
                    <VarPipeline />
                  </HarnessChrome>
                </DCArtboard>
              )}
            </DCSection>

            <DCSection id="focused" title="Single-agent focus" subtitle="for when one agent has your full attention">
              {tweaks.showCompanion && (
                <DCArtboard id="v5" label="05 · Companion — assistant panel" width={1100} height={900}>
                  <HarnessChrome title="harness" subtitle="companion · claude code" accent="var(--p-claude)">
                    <VarCompanion />
                  </HarnessChrome>
                </DCArtboard>
              )}
              {tweaks.showMosaic && (
                <DCArtboard id="v6" label="06 · Mosaic — quad split" width={1440} height={900}>
                  <HarnessChrome title="harness" subtitle="mosaic · 4 agents" accent="var(--accent)">
                    <VarMosaic />
                  </HarnessChrome>
                </DCArtboard>
              )}
            </DCSection>
          </DesignCanvas>

          <TweaksPanel title="Tweaks">
            <TweakSection label="Brand">
              <TweakColor label="accent" value={tweaks.accent} onChange={v => setTweak('accent', v)} />
              <TweakRadio label="dot character size" value={String(tweaks.dotSize)} options={[{value:'2',label:'S'},{value:'3',label:'M'},{value:'4',label:'L'}]} onChange={v => setTweak('dotSize', Number(v))} />
            </TweakSection>
            <TweakSection label="Variations visible">
              <TweakToggle label="01 Operator"  value={tweaks.showOperator}  onChange={v => setTweak('showOperator', v)} />
              <TweakToggle label="02 Console"   value={tweaks.showConsole}   onChange={v => setTweak('showConsole', v)} />
              <TweakToggle label="03 Roster"    value={tweaks.showRoster}    onChange={v => setTweak('showRoster', v)} />
              <TweakToggle label="04 Pipeline"  value={tweaks.showPipeline}  onChange={v => setTweak('showPipeline', v)} />
              <TweakToggle label="05 Companion" value={tweaks.showCompanion} onChange={v => setTweak('showCompanion', v)} />
              <TweakToggle label="06 Mosaic"    value={tweaks.showMosaic}    onChange={v => setTweak('showMosaic', v)} />
            </TweakSection>
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
