<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<title>Tabs & segmented</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body {
    background: var(--ds-bg-1);
    padding: 20px;
    box-sizing: border-box;
    color: var(--ds-fg-1);
    font-family: var(--ds-font-sans);
  }
  *, *::before, *::after { box-sizing: border-box; }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .swatch {
    border-radius: var(--ds-radius-sm);
    border: 1px solid var(--ds-border-1);
    overflow: hidden;
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    height: 88px;
  }
  .swatch .lbl {
    padding: 6px 8px;
    font-family: var(--ds-font-mono);
    font-size: 10px;
    color: var(--ds-fg-1);
    background: rgba(15,23,42,0.55);
    backdrop-filter: blur(4px);
    display: flex;
    justify-content: space-between;
    line-height: 1.3;
  }
  [data-theme="light"] .swatch .lbl { background: rgba(255,255,255,0.7); color: var(--ds-fg-1); border-top: 1px solid var(--ds-border-1); }
  .scale { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; }
</style>
</head>
<body>

<div style="display:flex; flex-direction: column; gap: 14px;">
  <div style="display:flex; gap: 0; border-bottom: 1px solid var(--ds-border-1);">
    
      <button style="height: 32px; padding: 0 14px; background: transparent; border: none; border-bottom: 2px solid transparent; color: var(--ds-fg-3); font-family: var(--ds-font-sans); font-size: 12px; font-weight: 500; cursor: pointer;">Overview</button>
      <button style="height: 32px; padding: 0 14px; background: transparent; border: none; border-bottom: 2px solid var(--ds-accent-1); color: var(--ds-fg-1); font-family: var(--ds-font-sans); font-size: 12px; font-weight: 600; cursor: pointer;">Activity</button>
      <button style="height: 32px; padding: 0 14px; background: transparent; border: none; border-bottom: 2px solid transparent; color: var(--ds-fg-3); font-family: var(--ds-font-sans); font-size: 12px; font-weight: 500; cursor: pointer;">Pull requests</button>
      <button style="height: 32px; padding: 0 14px; background: transparent; border: none; border-bottom: 2px solid transparent; color: var(--ds-fg-3); font-family: var(--ds-font-sans); font-size: 12px; font-weight: 500; cursor: pointer;">Issues</button>
      <button style="height: 32px; padding: 0 14px; background: transparent; border: none; border-bottom: 2px solid transparent; color: var(--ds-fg-3); font-family: var(--ds-font-sans); font-size: 12px; font-weight: 500; cursor: pointer;">Settings</button>
  </div>
  <div style="display: inline-flex; padding: 2px; background: var(--ds-bg-3); border-radius: var(--ds-radius-sm); border: 1px solid var(--ds-border-1); width: fit-content;">
    
      <button style="height: 22px; padding: 0 10px; background: transparent; border: 1px solid transparent; border-radius: 3px; color: var(--ds-fg-3); font-family: var(--ds-font-sans); font-size: 11px; font-weight: 500; cursor: pointer;">Day</button>
      <button style="height: 22px; padding: 0 10px; background: var(--ds-bg-1); border: 1px solid var(--ds-border-2); border-radius: 3px; color: var(--ds-fg-1); font-family: var(--ds-font-sans); font-size: 11px; font-weight: 500; cursor: pointer;">Week</button>
      <button style="height: 22px; padding: 0 10px; background: transparent; border: 1px solid transparent; border-radius: 3px; color: var(--ds-fg-3); font-family: var(--ds-font-sans); font-size: 11px; font-weight: 500; cursor: pointer;">Month</button>
      <button style="height: 22px; padding: 0 10px; background: transparent; border: 1px solid transparent; border-radius: 3px; color: var(--ds-fg-3); font-family: var(--ds-font-sans); font-size: 11px; font-weight: 500; cursor: pointer;">Quarter</button>
  </div>
</div>

</body>
</html>
