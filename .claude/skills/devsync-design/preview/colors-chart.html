<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<title>Chart palette</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body {
    background: var(--ds-bg-1);
    padding: 20px;
    box-sizing: border-box;
    color: var(--ds-fg-1);
    font-family: var(--ds-font-sans);
  }
  *, *::before, *::after { box-sizing: border-box; }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .swatch {
    border-radius: var(--ds-radius-sm);
    border: 1px solid var(--ds-border-1);
    overflow: hidden;
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    height: 88px;
  }
  .swatch .lbl {
    padding: 6px 8px;
    font-family: var(--ds-font-mono);
    font-size: 10px;
    color: var(--ds-fg-1);
    background: rgba(15,23,42,0.55);
    backdrop-filter: blur(4px);
    display: flex;
    justify-content: space-between;
    line-height: 1.3;
  }
  [data-theme="light"] .swatch .lbl { background: rgba(255,255,255,0.7); color: var(--ds-fg-1); border-top: 1px solid var(--ds-border-1); }
  .scale { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; }
</style>
</head>
<body>

<div style="display:grid; grid-template-columns: repeat(6, 1fr); gap: 8px;">
  
    <div class="swatch" style="background: #3B6FF6; height: 64px;">
      <div class="lbl"><span>chart-1</span><span style="color: var(--ds-fg-3);">blue</span></div>
    </div>
    <div class="swatch" style="background: #14B8A6; height: 64px;">
      <div class="lbl"><span>chart-2</span><span style="color: var(--ds-fg-3);">teal</span></div>
    </div>
    <div class="swatch" style="background: #8B5CF6; height: 64px;">
      <div class="lbl"><span>chart-3</span><span style="color: var(--ds-fg-3);">purple</span></div>
    </div>
    <div class="swatch" style="background: #F97316; height: 64px;">
      <div class="lbl"><span>chart-4</span><span style="color: var(--ds-fg-3);">orange</span></div>
    </div>
    <div class="swatch" style="background: #EAB308; height: 64px;">
      <div class="lbl"><span>chart-5</span><span style="color: var(--ds-fg-3);">yellow</span></div>
    </div>
    <div class="swatch" style="background: #EC4899; height: 64px;">
      <div class="lbl"><span>chart-6</span><span style="color: var(--ds-fg-3);">pink</span></div>
    </div>
</div>
<div style="margin-top: 10px; display:flex; gap: 8px; font-family: var(--ds-font-mono); font-size: 10px; color: var(--ds-fg-3);">
  categorical chart palette · ordered for hue distinction · never carries semantic meaning
</div>

</body>
</html>
