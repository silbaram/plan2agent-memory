<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<title>Type families</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body {
    background: var(--ds-bg-1);
    padding: 20px;
    box-sizing: border-box;
    color: var(--ds-fg-1);
    font-family: var(--ds-font-sans);
  }
  *, *::before, *::after { box-sizing: border-box; }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .swatch {
    border-radius: var(--ds-radius-sm);
    border: 1px solid var(--ds-border-1);
    overflow: hidden;
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    height: 88px;
  }
  .swatch .lbl {
    padding: 6px 8px;
    font-family: var(--ds-font-mono);
    font-size: 10px;
    color: var(--ds-fg-1);
    background: rgba(15,23,42,0.55);
    backdrop-filter: blur(4px);
    display: flex;
    justify-content: space-between;
    line-height: 1.3;
  }
  [data-theme="light"] .swatch .lbl { background: rgba(255,255,255,0.7); color: var(--ds-fg-1); border-top: 1px solid var(--ds-border-1); }
  .scale { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; }
</style>
</head>
<body>

<div style="display:grid; grid-template-columns: 1fr 1fr; gap: 16px;">
  <div style="border: 1px solid var(--ds-border-1); border-radius: var(--ds-radius-md); padding: 16px 18px;">
    <div style="font-family: var(--ds-font-mono); font-size: 10px; color: var(--ds-fg-3); text-transform: uppercase; letter-spacing: 0.04em;">UI · Sans</div>
    <div style="font-family: var(--ds-font-sans); font-size: 32px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.1; color: var(--ds-fg-1); margin-top: 4px;">Geist</div>
    <div style="font-family: var(--ds-font-sans); font-size: 13px; color: var(--ds-fg-2); margin-top: 4px;">Aa Bb Cc 1234567890</div>
  </div>
  <div style="border: 1px solid var(--ds-border-1); border-radius: var(--ds-radius-md); padding: 16px 18px;">
    <div style="font-family: var(--ds-font-mono); font-size: 10px; color: var(--ds-fg-3); text-transform: uppercase; letter-spacing: 0.04em;">Code · Mono</div>
    <div style="font-family: var(--ds-font-mono); font-size: 32px; font-weight: 500; line-height: 1.1; color: var(--ds-fg-1); margin-top: 4px;">Geist Mono</div>
    <div style="font-family: var(--ds-font-mono); font-size: 13px; color: var(--ds-fg-2); margin-top: 4px;">Aa Bb Cc 0123456789 →←</div>
  </div>
</div>

</body>
</html>
