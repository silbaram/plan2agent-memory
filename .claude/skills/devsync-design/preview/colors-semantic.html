<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<title>Semantic colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body {
    background: var(--ds-bg-1);
    padding: 20px;
    box-sizing: border-box;
    color: var(--ds-fg-1);
    font-family: var(--ds-font-sans);
  }
  *, *::before, *::after { box-sizing: border-box; }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .swatch {
    border-radius: var(--ds-radius-sm);
    border: 1px solid var(--ds-border-1);
    overflow: hidden;
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    height: 88px;
  }
  .swatch .lbl {
    padding: 6px 8px;
    font-family: var(--ds-font-mono);
    font-size: 10px;
    color: var(--ds-fg-1);
    background: rgba(15,23,42,0.55);
    backdrop-filter: blur(4px);
    display: flex;
    justify-content: space-between;
    line-height: 1.3;
  }
  [data-theme="light"] .swatch .lbl { background: rgba(255,255,255,0.7); color: var(--ds-fg-1); border-top: 1px solid var(--ds-border-1); }
  .scale { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; }
</style>
</head>
<body>

<div style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 10px;">
  
    <div style="border:1px solid var(--ds-success-border); background: var(--ds-success-bg); border-radius: var(--ds-radius-md); padding: 10px 12px; display:flex; flex-direction:column; gap:6px;">
      <div style="display:flex; align-items:center; gap:8px;">
        <span style="width:10px; height:10px; border-radius:999px; background: var(--ds-success-1);"></span>
        <span style="font-size: 12px; font-weight: 600; color: var(--ds-success-fg);">Success</span>
      </div>
      <span style="font-family: var(--ds-font-mono); font-size: 10px; color: var(--ds-fg-3);">#22C55E</span>
    </div>
    <div style="border:1px solid var(--ds-warning-border); background: var(--ds-warning-bg); border-radius: var(--ds-radius-md); padding: 10px 12px; display:flex; flex-direction:column; gap:6px;">
      <div style="display:flex; align-items:center; gap:8px;">
        <span style="width:10px; height:10px; border-radius:999px; background: var(--ds-warning-1);"></span>
        <span style="font-size: 12px; font-weight: 600; color: var(--ds-warning-fg);">Warning</span>
      </div>
      <span style="font-family: var(--ds-font-mono); font-size: 10px; color: var(--ds-fg-3);">#FACC15</span>
    </div>
    <div style="border:1px solid var(--ds-danger-border); background: var(--ds-danger-bg); border-radius: var(--ds-radius-md); padding: 10px 12px; display:flex; flex-direction:column; gap:6px;">
      <div style="display:flex; align-items:center; gap:8px;">
        <span style="width:10px; height:10px; border-radius:999px; background: var(--ds-danger-1);"></span>
        <span style="font-size: 12px; font-weight: 600; color: var(--ds-danger-fg);">Danger</span>
      </div>
      <span style="font-family: var(--ds-font-mono); font-size: 10px; color: var(--ds-fg-3);">#F87171</span>
    </div>
    <div style="border:1px solid var(--ds-info-border); background: var(--ds-info-bg); border-radius: var(--ds-radius-md); padding: 10px 12px; display:flex; flex-direction:column; gap:6px;">
      <div style="display:flex; align-items:center; gap:8px;">
        <span style="width:10px; height:10px; border-radius:999px; background: var(--ds-info-1);"></span>
        <span style="font-size: 12px; font-weight: 600; color: var(--ds-info-fg);">Info</span>
      </div>
      <span style="font-family: var(--ds-font-mono); font-size: 10px; color: var(--ds-fg-3);">#3B6FF6</span>
    </div>
</div>
<div style="margin-top: 10px; display:flex; gap: 8px; font-family: var(--ds-font-sans); font-size: 11px; color: var(--ds-fg-3);">
  status colors never carry brand meaning · always paired with an icon
</div>

</body>
</html>
