<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<title>Shadow scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body {
    background: var(--ds-bg-1);
    padding: 20px;
    box-sizing: border-box;
    color: var(--ds-fg-1);
    font-family: var(--ds-font-sans);
  }
  *, *::before, *::after { box-sizing: border-box; }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .swatch {
    border-radius: var(--ds-radius-sm);
    border: 1px solid var(--ds-border-1);
    overflow: hidden;
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    height: 88px;
  }
  .swatch .lbl {
    padding: 6px 8px;
    font-family: var(--ds-font-mono);
    font-size: 10px;
    color: var(--ds-fg-1);
    background: rgba(15,23,42,0.55);
    backdrop-filter: blur(4px);
    display: flex;
    justify-content: space-between;
    line-height: 1.3;
  }
  [data-theme="light"] .swatch .lbl { background: rgba(255,255,255,0.7); color: var(--ds-fg-1); border-top: 1px solid var(--ds-border-1); }
  .scale { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; }
</style>
</head>
<body>

<div style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 14px;">
  
    <div style="display:flex; flex-direction: column; align-items: center; gap: 8px; padding: 8px 0;">
      <div style="width: 100%; height: 56px; background: var(--ds-bg-2); border: 1px solid var(--ds-border-1); border-radius: var(--ds-radius-md); box-shadow: var(--ds-shadow-xs);"></div>
      <div style="font-family: var(--ds-font-mono); font-size: 11px; color: var(--ds-fg-1);">shadow-xs</div>
      <div style="font-family: var(--ds-font-sans); font-size: 10px; color: var(--ds-fg-3);">hairline</div>
    </div>
    <div style="display:flex; flex-direction: column; align-items: center; gap: 8px; padding: 8px 0;">
      <div style="width: 100%; height: 56px; background: var(--ds-bg-2); border: 1px solid var(--ds-border-1); border-radius: var(--ds-radius-md); box-shadow: var(--ds-shadow-sm);"></div>
      <div style="font-family: var(--ds-font-mono); font-size: 11px; color: var(--ds-fg-1);">shadow-sm</div>
      <div style="font-family: var(--ds-font-sans); font-size: 10px; color: var(--ds-fg-3);">sticky chrome</div>
    </div>
    <div style="display:flex; flex-direction: column; align-items: center; gap: 8px; padding: 8px 0;">
      <div style="width: 100%; height: 56px; background: var(--ds-bg-2); border: 1px solid var(--ds-border-1); border-radius: var(--ds-radius-md); box-shadow: var(--ds-shadow-md);"></div>
      <div style="font-family: var(--ds-font-mono); font-size: 11px; color: var(--ds-fg-1);">shadow-md</div>
      <div style="font-family: var(--ds-font-sans); font-size: 10px; color: var(--ds-fg-3);">popovers · tooltips</div>
    </div>
    <div style="display:flex; flex-direction: column; align-items: center; gap: 8px; padding: 8px 0;">
      <div style="width: 100%; height: 56px; background: var(--ds-bg-2); border: 1px solid var(--ds-border-1); border-radius: var(--ds-radius-md); box-shadow: var(--ds-shadow-lg);"></div>
      <div style="font-family: var(--ds-font-mono); font-size: 11px; color: var(--ds-fg-1);">shadow-lg</div>
      <div style="font-family: var(--ds-font-sans); font-size: 10px; color: var(--ds-fg-3);">modals · command-k</div>
    </div>
</div>
<div style="margin-top: 8px; font-family: var(--ds-font-sans); font-size: 11px; color: var(--ds-fg-3);">
  shadows are reserved for elevated, floating chrome · panels use borders, not shadows
</div>

</body>
</html>
