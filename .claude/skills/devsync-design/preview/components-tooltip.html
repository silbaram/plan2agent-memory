<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<title>Tooltip</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: var(--ds-bg-1); padding: 20px; box-sizing: border-box; color: var(--ds-fg-1); font-family: var(--ds-font-sans); }
  *, *::before, *::after { box-sizing: border-box; }
  .ico { width:16px;height:16px;flex-shrink:0; }
  .kbd { font-family: var(--ds-font-mono); font-size: 10px; background: var(--ds-bg-2); border: 1px solid var(--ds-border-2); border-radius: var(--ds-radius-xs); padding: 1px 5px; color: var(--ds-fg-3); }
</style>
</head>
<body>
<div style="display:flex; gap:32px; align-items:center; flex-wrap:wrap;">
  <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
    <div style="position:relative; display:inline-block;">
      <div style="background: var(--ds-slate-900); border:1px solid var(--ds-border-2); color:#F8FAFC; font-size:11px; padding:5px 8px; border-radius: var(--ds-radius-sm); box-shadow: var(--ds-shadow-md); white-space:nowrap;">Merge pull request</div>
      <div style="position:absolute; left:50%; bottom:-4px; transform:translateX(-50%) rotate(45deg); width:8px; height:8px; background: var(--ds-slate-900); border-right:1px solid var(--ds-border-2); border-bottom:1px solid var(--ds-border-2);"></div>
    </div>
    <button style="height:28px; padding:0 12px; background: var(--ds-accent-1); color:#fff; border:none; border-radius: var(--ds-radius-sm); font-size:13px; font-weight:500;">Merge</button>
  </div>

  <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
    <div style="position:relative; display:inline-block;">
      <div style="display:flex; align-items:center; gap:8px; background: var(--ds-slate-900); border:1px solid var(--ds-border-2); color:#F8FAFC; font-size:11px; padding:5px 8px; border-radius: var(--ds-radius-sm); box-shadow: var(--ds-shadow-md); white-space:nowrap;">
        Command palette <span class="kbd" style="background:var(--ds-slate-800); border-color:var(--ds-slate-700); color:#CBD5E1;">⌘ K</span>
      </div>
      <div style="position:absolute; left:50%; bottom:-4px; transform:translateX(-50%) rotate(45deg); width:8px; height:8px; background: var(--ds-slate-900); border-right:1px solid var(--ds-border-2); border-bottom:1px solid var(--ds-border-2);"></div>
    </div>
    <button style="width:28px; height:28px; background: var(--ds-bg-3); color: var(--ds-fg-2); border:1px solid var(--ds-border-2); border-radius: var(--ds-radius-sm); display:inline-flex; align-items:center; justify-content:center;"><svg class="ico" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22a10 10 0 100-20 10 10 0 000 20z"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg></button>
  </div>

  <div style="max-width:200px;">
    <div style="font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.04em; color:var(--ds-fg-3); margin-bottom:6px;">TOOLTIP</div>
    <div style="font-size:12px; color: var(--ds-fg-2); line-height:1.5;">Always opaque (never translucent). 11px text, shortcut chips allowed. Appears after 400ms hover.</div>
  </div>
</div>
</body>
</html>
