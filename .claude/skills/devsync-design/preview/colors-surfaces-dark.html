<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<title>Surfaces — dark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body {
    background: var(--ds-bg-1);
    padding: 20px;
    box-sizing: border-box;
    color: var(--ds-fg-1);
    font-family: var(--ds-font-sans);
  }
  *, *::before, *::after { box-sizing: border-box; }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .swatch {
    border-radius: var(--ds-radius-sm);
    border: 1px solid var(--ds-border-1);
    overflow: hidden;
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    height: 88px;
  }
  .swatch .lbl {
    padding: 6px 8px;
    font-family: var(--ds-font-mono);
    font-size: 10px;
    color: var(--ds-fg-1);
    background: rgba(15,23,42,0.55);
    backdrop-filter: blur(4px);
    display: flex;
    justify-content: space-between;
    line-height: 1.3;
  }
  [data-theme="light"] .swatch .lbl { background: rgba(255,255,255,0.7); color: var(--ds-fg-1); border-top: 1px solid var(--ds-border-1); }
  .scale { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; }
</style>
</head>
<body>

<div style="display:grid; grid-template-columns: repeat(5, 1fr); gap: 8px;">
  
    <div class="swatch" style="background: #060A14; height: 88px;">
      <div class="lbl" style="background: rgba(0,0,0,0.45);"><span>bg-1</span><span style="color: var(--ds-fg-3);">page</span></div>
    </div>
    <div class="swatch" style="background: #0F172A; height: 88px;">
      <div class="lbl" style="background: rgba(0,0,0,0.45);"><span>bg-2</span><span style="color: var(--ds-fg-3);">panel</span></div>
    </div>
    <div class="swatch" style="background: #1E293B; height: 88px;">
      <div class="lbl" style="background: rgba(0,0,0,0.45);"><span>bg-3</span><span style="color: var(--ds-fg-3);">hover</span></div>
    </div>
    <div class="swatch" style="background: #334155; height: 88px;">
      <div class="lbl" style="background: rgba(0,0,0,0.45);"><span>bg-4</span><span style="color: var(--ds-fg-3);">pressed</span></div>
    </div>
    <div class="swatch" style="background: #F8FAFC; height: 88px;">
      <div class="lbl" style="background: rgba(0,0,0,0.45);"><span>bg-inverse</span><span style="color: var(--ds-fg-3);">inverse</span></div>
    </div>
</div>
<div style="margin-top: 10px; display:flex; gap: 8px; font-family: var(--ds-font-mono); font-size: 10px; color: var(--ds-fg-3);">
  surfaces · dark mode (default product surface) · stacked low-to-high
</div>

</body>
</html>
