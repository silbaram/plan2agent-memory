<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<title>Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body {
    background: var(--ds-bg-1);
    padding: 20px;
    box-sizing: border-box;
    color: var(--ds-fg-1);
    font-family: var(--ds-font-sans);
  }
  *, *::before, *::after { box-sizing: border-box; }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .swatch {
    border-radius: var(--ds-radius-sm);
    border: 1px solid var(--ds-border-1);
    overflow: hidden;
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    height: 88px;
  }
  .swatch .lbl {
    padding: 6px 8px;
    font-family: var(--ds-font-mono);
    font-size: 10px;
    color: var(--ds-fg-1);
    background: rgba(15,23,42,0.55);
    backdrop-filter: blur(4px);
    display: flex;
    justify-content: space-between;
    line-height: 1.3;
  }
  [data-theme="light"] .swatch .lbl { background: rgba(255,255,255,0.7); color: var(--ds-fg-1); border-top: 1px solid var(--ds-border-1); }
  .scale { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; }
</style>
</head>
<body>

<div style="display:grid; grid-template-columns: 1fr 1fr; gap: 12px; height: 100%;">
  <div style="background: var(--ds-bg-2); border: 1px solid var(--ds-border-1); border-radius: var(--ds-radius-md); padding: 18px; display:flex; align-items: center; justify-content: center; color: var(--ds-accent-1);">
    <svg viewBox="0 0 160 32" width="160" height="32" fill="none">
      <rect x="0" y="0" width="32" height="32" rx="6" fill="currentColor"/>
      <g stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <circle cx="10" cy="9" r="2.2"/><circle cx="10" cy="23" r="2.2"/><circle cx="22" cy="16" r="2.2"/>
        <path d="M10 11.5 V20.5"/>
        <path d="M12.2 9 H17 a3 3 0 0 1 3 3 V14"/>
        <path d="M12.2 23 H17 a3 3 0 0 0 3 -3 V18"/>
      </g>
      <text x="44" y="22" font-family="Geist, system-ui, sans-serif" font-size="18" font-weight="600" letter-spacing="-0.02em" fill="#F8FAFC">DevSync</text>
    </svg>
  </div>
  <div style="background: #FFFFFF; border: 1px solid #E2E8F0; border-radius: var(--ds-radius-md); padding: 18px; display:flex; align-items: center; justify-content: center; color: #2553EB;">
    <svg viewBox="0 0 160 32" width="160" height="32" fill="none">
      <rect x="0" y="0" width="32" height="32" rx="6" fill="currentColor"/>
      <g stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <circle cx="10" cy="9" r="2.2"/><circle cx="10" cy="23" r="2.2"/><circle cx="22" cy="16" r="2.2"/>
        <path d="M10 11.5 V20.5"/>
        <path d="M12.2 9 H17 a3 3 0 0 1 3 3 V14"/>
        <path d="M12.2 23 H17 a3 3 0 0 0 3 -3 V18"/>
      </g>
      <text x="44" y="22" font-family="Geist, system-ui, sans-serif" font-size="18" font-weight="600" letter-spacing="-0.02em" fill="#0F172A">DevSync</text>
    </svg>
  </div>
</div>

</body>
</html>
