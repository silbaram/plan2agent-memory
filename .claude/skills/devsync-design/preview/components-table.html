<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<title>Data table row</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body {
    background: var(--ds-bg-1);
    padding: 20px;
    box-sizing: border-box;
    color: var(--ds-fg-1);
    font-family: var(--ds-font-sans);
  }
  *, *::before, *::after { box-sizing: border-box; }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .swatch {
    border-radius: var(--ds-radius-sm);
    border: 1px solid var(--ds-border-1);
    overflow: hidden;
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    height: 88px;
  }
  .swatch .lbl {
    padding: 6px 8px;
    font-family: var(--ds-font-mono);
    font-size: 10px;
    color: var(--ds-fg-1);
    background: rgba(15,23,42,0.55);
    backdrop-filter: blur(4px);
    display: flex;
    justify-content: space-between;
    line-height: 1.3;
  }
  [data-theme="light"] .swatch .lbl { background: rgba(255,255,255,0.7); color: var(--ds-fg-1); border-top: 1px solid var(--ds-border-1); }
  .scale { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; }
</style>
</head>
<body>

<div style="border: 1px solid var(--ds-border-1); border-radius: var(--ds-radius-md); overflow: hidden; background: var(--ds-bg-2);">
  <div style="display:grid; grid-template-columns: 60px 1fr 80px 100px 80px; height: 32px; background: var(--ds-bg-3); border-bottom: 1px solid var(--ds-border-1); align-items: center; padding: 0 12px; gap: 10px; font-family: var(--ds-font-sans); font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--ds-fg-3); font-weight: 600;">
    <span>ID</span><span>TITLE</span><span>STATUS</span><span>ASSIGNEE</span><span style="text-align:right;">UPDATED</span>
  </div>
  
    <div style="display:grid; grid-template-columns: 60px 1fr 80px 100px 80px; height: 32px; border-bottom: 1px solid var(--ds-border-1); align-items: center; padding: 0 12px; gap: 10px; font-family: var(--ds-font-sans); font-size: 12px; color: var(--ds-fg-1);">
      <span style="font-family: var(--ds-font-mono); color: var(--ds-fg-3);">DEV-1284</span>
      <span style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Refactor auth token refresh</span>
      <span style="font-size: 11px; color: var(--ds-fg-2);">Open</span>
      <span style="font-size: 11px; color: var(--ds-fg-2);">chen.j</span>
      <span style="text-align: right; font-family: var(--ds-font-mono); font-size: 11px; color: var(--ds-fg-3);">2m</span>
    </div>
    <div style="display:grid; grid-template-columns: 60px 1fr 80px 100px 80px; height: 32px; border-bottom: 1px solid var(--ds-border-1); align-items: center; padding: 0 12px; gap: 10px; font-family: var(--ds-font-sans); font-size: 12px; color: var(--ds-fg-1);">
      <span style="font-family: var(--ds-font-mono); color: var(--ds-fg-3);">DEV-1283</span>
      <span style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Flaky CI on macos-14 runner</span>
      <span style="font-size: 11px; color: var(--ds-fg-2);">In review</span>
      <span style="font-size: 11px; color: var(--ds-fg-2);">kim.s</span>
      <span style="text-align: right; font-family: var(--ds-font-mono); font-size: 11px; color: var(--ds-fg-3);">17m</span>
    </div>
    <div style="display:grid; grid-template-columns: 60px 1fr 80px 100px 80px; height: 32px; border-bottom: none; align-items: center; padding: 0 12px; gap: 10px; font-family: var(--ds-font-sans); font-size: 12px; color: var(--ds-fg-1);">
      <span style="font-family: var(--ds-font-mono); color: var(--ds-fg-3);">DEV-1282</span>
      <span style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">SSO logout returns 500</span>
      <span style="font-size: 11px; color: var(--ds-fg-2);">Blocked</span>
      <span style="font-size: 11px; color: var(--ds-fg-2);">park.h</span>
      <span style="text-align: right; font-family: var(--ds-font-mono); font-size: 11px; color: var(--ds-fg-3);">1h</span>
    </div>
</div>

</body>
</html>
