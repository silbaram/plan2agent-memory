<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<title>Dropdown / menu</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: var(--ds-bg-1); padding: 20px; box-sizing: border-box; color: var(--ds-fg-1); font-family: var(--ds-font-sans); }
  *, *::before, *::after { box-sizing: border-box; }
  .ico { width:16px;height:16px;flex-shrink:0; }
  .kbd { font-family: var(--ds-font-mono); font-size: 10px; background: var(--ds-bg-2); border: 1px solid var(--ds-border-2); border-radius: var(--ds-radius-xs); padding: 1px 5px; color: var(--ds-fg-3); }
</style>
</head>
<body>
<div style="display:flex; gap:24px; align-items:flex-start;">
  <div style="width:240px; background: var(--ds-bg-2); border:1px solid var(--ds-border-2); border-radius: var(--ds-radius-md); box-shadow: var(--ds-shadow-lg); padding:4px;">
    
  <div style="display:flex; align-items:center; gap:10px; height:30px; padding:0 10px; border-radius: var(--ds-radius-sm); color: var(--ds-fg-1); font-size:13px; cursor:pointer;">
    <span style="color:var(--ds-fg-3); display:inline-flex;"><svg class="ico" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 013 3L12 15l-4 1 1-4z"/></svg></span>
    <span style="flex:1;">Edit issue</span>
    <span class="kbd">E</span>
  </div>
    
  <div style="display:flex; align-items:center; gap:10px; height:30px; padding:0 10px; border-radius: var(--ds-radius-sm); color: var(--ds-fg-1); font-size:13px; cursor:pointer;">
    <span style="color:var(--ds-fg-3); display:inline-flex;"><svg class="ico" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M9 9h10a2 2 0 012 2v10a2 2 0 01-2 2H9a2 2 0 01-2-2V11a2 2 0 012-2z"/><path d="M5 15H4a2 2 0 01-2-2V3a2 2 0 012-2h10a2 2 0 012 2v1"/></svg></span>
    <span style="flex:1;">Copy link</span>
    <span class="kbd">⌘ C</span>
  </div>
    
  <div style="display:flex; align-items:center; gap:10px; height:30px; padding:0 10px; border-radius: var(--ds-radius-sm); color: var(--ds-fg-1); font-size:13px; cursor:pointer;">
    <span style="color:var(--ds-fg-3); display:inline-flex;"><svg class="ico" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3v12"/><path d="M18 9a3 3 0 100-6 3 3 0 000 6z"/><path d="M6 18a3 3 0 100-6 3 3 0 000 6z"/><path d="M18 9a9 9 0 01-9 9"/></svg></span>
    <span style="flex:1;">Create branch</span>
    
  </div>
    <div style="height:1px; background: var(--ds-border-1); margin:4px 6px;"></div>
    <div style="display:flex; align-items:center; gap:10px; height:30px; padding:0 10px; border-radius: var(--ds-radius-sm); color: var(--ds-fg-1); font-size:13px; cursor:pointer; background: var(--ds-bg-3);">
      <span style="color: var(--ds-fg-3); display:inline-flex;"><svg class="ico" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 7"/></svg></span>
      <span style="flex:1;">Mark as done</span>
    </div>
    <div style="height:1px; background: var(--ds-border-1); margin:4px 6px;"></div>
    
  <div style="display:flex; align-items:center; gap:10px; height:30px; padding:0 10px; border-radius: var(--ds-radius-sm); color: var(--ds-danger-fg); font-size:13px; cursor:pointer;">
    <span style="color:var(--ds-danger-1); display:inline-flex;"><svg class="ico" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/><path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></span>
    <span style="flex:1;">Delete</span>
    <span class="kbd">⌫</span>
  </div>
  </div>
  <div style="max-width:220px; padding-top:6px;">
    <div style="font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.04em; color:var(--ds-fg-3); margin-bottom:6px;">DROPDOWN MENU</div>
    <div style="font-size:12px; color: var(--ds-fg-2); line-height:1.5;">Floating chrome: 1px border + shadow-lg. 30px rows, leading icon, trailing shortcut. Destructive items use danger color. Highlighted row = bg-3.</div>
  </div>
</div>
</body>
</html>
