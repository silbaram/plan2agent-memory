<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>component · agent row</title>
<link rel="stylesheet" href="_card.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="../design-system/dot-character.jsx"></script>
</head><body>
<div class="card">
  <div class="card-header">
    <span class="card-title">agent row</span>
    <span class="card-sub">사이드바 · 리스트 row</span>
  </div>
  <div class="card-desc">사이드바와 리스트의 기본 행. 도트 캐릭터(2px) + 프로바이더 마크 + 라벨 + 우측 메타. 선택 상태는 좌측 2px 액센트 보더.</div>

  <div class="label">states</div>
  <div id="states" style="display:flex; flex-direction:column; padding:12px; background:var(--bg-2); border:1px solid var(--border-1); border-radius:var(--r-2);"></div>
</div>

<script type="text/babel">
function Mark({ provider, color }) {
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", justifyContent: "center",
      width: 18, height: 18, border: `1px solid ${color}`, color,
      fontFamily: "var(--font-mono)", fontSize: 10, fontWeight: 600, flexShrink: 0,
    }}>{provider}</span>
  );
}

function Row({ state, mark, color, name, meta, selected, hover }) {
  return (
    <div style={{
      display: "flex", alignItems: "center", gap: 12,
      padding: "10px 12px",
      borderLeft: selected ? `2px solid ${color || "var(--accent)"}` : "2px solid transparent",
      background: selected ? "var(--bg-5)" : hover ? "var(--bg-3)" : "transparent",
      cursor: "pointer",
    }}>
      <DotChar state={state} size={2} />
      <Mark provider={mark} color={color} />
      <span style={{
        fontSize: 13,
        color: selected ? "var(--fg-1)" : hover ? "var(--fg-1)" : "var(--fg-2)",
        fontWeight: selected ? 500 : 400,
        flex: 1, minWidth: 0, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
      }}>{name}</span>
      <span style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--fg-3)" }}>{meta}</span>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("states")).render(
  <>
    <Row state="tool"     mark="C" color="#D97757" name="claude code · refactor session.ts" meta="14:22" selected />
    <Row state="thinking" mark="O" color="#A8B1A0" name="codex · search refresh tokens"      meta="14:18" />
    <Row state="typing"   mark="G" color="#6B9BB8" name="gemini · summarize PR diff"          meta="14:11" hover />
    <Row state="done"     mark="A" color="#B89968" name="aider · run tests"                   meta="13:54" />
    <Row state="idle"     mark="C" color="#D97757" name="claude code · explore directory"    meta="11:30" />
    <Row state="error"    mark="O" color="#A8B1A0" name="codex · npm install failure"        meta="10:02" />
    <Row state="sleep"    mark="C" color="#D97757" name="claude code · paused: 어제 작업"   meta="yest." />
  </>
);
</script>
</body></html>
