<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>component · transcript & diff</title>
<link rel="stylesheet" href="_card.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="../design-system/dot-character.jsx"></script>
</head><body>
<div class="card">
  <div class="card-header">
    <span class="card-title">transcript · diff</span>
    <span class="card-sub">conversation rows</span>
  </div>
  <div class="card-desc">대화 표시. 4가지 row 종류 — user message, agent message, tool call, diff card. 도구 호출은 좌측 2px provider tint borderLeft.</div>

  <div class="label">transcript rows</div>
  <div id="rows" style="padding:20px; border:1px solid var(--border-1); border-radius:var(--r-2);"></div>
</div>

<script type="text/babel">
function UserRow() {
  return (
    <div style={{ marginBottom: 18, display: "flex", gap: 14 }}>
      <div style={{ width: 24, height: 24, flexShrink: 0, display: "inline-flex", alignItems: "center", justifyContent: "center", border: "1px solid var(--border-2)", borderRadius: 3, fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--fg-2)" }}>한</div>
      <div style={{ flex: 1 }}>
        <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginBottom: 4 }}>
          <span style={{ fontWeight: 500, fontSize: 13 }}>한민</span>
          <span style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--fg-3)" }}>14:18</span>
        </div>
        <div style={{ fontSize: 13, color: "var(--fg-2)", lineHeight: 1.6 }}>
          checkout 401 에러 살펴봐줘. session 만료 처리에 문제가 있는 것 같아.
        </div>
      </div>
    </div>
  );
}

function AgentRow() {
  return (
    <div style={{ marginBottom: 14, display: "flex", gap: 14 }}>
      <div style={{ width: 24, height: 24, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
        <DotChar state="thinking" size={2} />
      </div>
      <div style={{ flex: 1 }}>
        <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginBottom: 4 }}>
          <span style={{ fontWeight: 500, fontSize: 13 }}>claude code</span>
          <span style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--fg-3)" }}>14:18 · sonnet 4.5</span>
        </div>
        <div style={{ fontSize: 13, color: "var(--fg-2)", lineHeight: 1.6 }}>
          <code style={{ fontFamily: "var(--font-mono)", fontSize: 12, color: "var(--accent)" }}>app/auth/session.ts</code>를 살펴보겠습니다. refresh 로직이 만료 직전에만 트리거되는 게 의심스럽네요.
        </div>
      </div>
    </div>
  );
}

function ToolRow({ tool, arg, running }) {
  return (
    <div style={{ marginBottom: 8, marginLeft: 38, display: "flex", alignItems: "center", gap: 10, padding: "6px 10px", background: "var(--bg-2)", borderLeft: "2px solid #D97757", borderRadius: 3, fontFamily: "var(--font-mono)", fontSize: 11 }}>
      {running ? <DotTiny state="active" size={1.5} /> : <DotTiny state="done" size={1.5} />}
      <span style={{ color: running ? "var(--accent)" : "var(--fg-2)" }}>{tool}</span>
      <span style={{ color: "var(--fg-4)" }}>(</span>
      <span style={{ color: "var(--fg-1)" }}>"{arg}"</span>
      <span style={{ color: "var(--fg-4)" }}>)</span>
      {!running && <span style={{ marginLeft: "auto", color: "var(--fg-3)" }}>0.3s</span>}
    </div>
  );
}

function DiffCard() {
  return (
    <div style={{ marginBottom: 14, marginLeft: 38, border: "1px solid var(--border-2)", borderRadius: 6, overflow: "hidden" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "8px 14px", background: "var(--bg-3)", borderBottom: "1px solid var(--border-2)" }}>
        <span style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--fg-1)" }}>app/auth/session.ts</span>
        <span style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "#8FB66B" }}>+8</span>
        <span style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "#E5654B" }}>−3</span>
        <span style={{ flex: 1 }} />
        <button style={{ padding: "3px 10px", background: "var(--accent)", color: "#0F0F0D", border: 0, borderRadius: 3, fontFamily: "var(--font-sans)", fontSize: 11, fontWeight: 600 }}>apply</button>
        <button style={{ padding: "3px 10px", background: "transparent", color: "var(--fg-2)", border: "1px solid var(--border-2)", borderRadius: 3, fontFamily: "var(--font-sans)", fontSize: 11 }}>reject</button>
      </div>
      <pre style={{ margin: 0, padding: "10px 14px", fontFamily: "var(--font-mono)", fontSize: 11, lineHeight: 1.6, color: "var(--fg-2)", background: "var(--bg-2)" }}>
{`  if (token.expiresAt < Date.now()) {`}
{`-   throw new SessionExpiredError();`}
{`+   const refreshed = await refresh(token);`}
{`+   if (!refreshed) {`}
{`+     throw new SessionExpiredError();`}
{`+   }`}
{`+   return refreshed;`}
{`  }`}
      </pre>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("rows")).render(
  <>
    <UserRow />
    <AgentRow />
    <ToolRow tool="read_file" arg="app/auth/session.ts" running={false} />
    <ToolRow tool="grep" arg="refreshToken" running={false} />
    <ToolRow tool="edit_file" arg="app/auth/session.ts" running={true} />
    <DiffCard />
  </>
);
</script>
</body></html>
