<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<title>Toasts</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: var(--ds-bg-1); padding: 20px; box-sizing: border-box; color: var(--ds-fg-1); font-family: var(--ds-font-sans); }
  *, *::before, *::after { box-sizing: border-box; }
  .ico { width:16px;height:16px;flex-shrink:0; }
  .kbd { font-family: var(--ds-font-mono); font-size: 10px; background: var(--ds-bg-2); border: 1px solid var(--ds-border-2); border-radius: var(--ds-radius-xs); padding: 1px 5px; color: var(--ds-fg-3); }
</style>
</head>
<body>
<div style="display:flex; flex-direction:column; gap:10px; max-width:380px;">
  <div style="display:flex; align-items:center; gap:10px; padding:10px 12px; background: var(--ds-bg-2); border:1px solid var(--ds-border-2); border-radius: var(--ds-radius-md); box-shadow: var(--ds-shadow-lg);">
    <span style="color: var(--ds-success-1); display:inline-flex;"><svg class="ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22a10 10 0 100-20 10 10 0 000 20z"/><path d="M9 12l2 2 4-4"/></svg></span>
    <span style="flex:1; font-size:13px; color: var(--ds-fg-1);">Issue <span style="font-family:var(--ds-font-mono); color:var(--ds-fg-2);">DEV-1284</span> closed</span>
    <button style="background:none; border:none; color: var(--ds-accent-1); font-size:12px; font-weight:500; cursor:pointer;">Undo</button>
    <span style="color: var(--ds-fg-4); display:inline-flex; cursor:pointer;"><svg class="ico" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M6 18L18 6"/><path d="M6 6l12 12"/></svg></span>
  </div>
  <div style="display:flex; align-items:center; gap:10px; padding:10px 12px; background: var(--ds-bg-2); border:1px solid var(--ds-border-2); border-radius: var(--ds-radius-md); box-shadow: var(--ds-shadow-lg);">
    <span style="color: var(--ds-danger-1); display:inline-flex;"><svg class="ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22a10 10 0 100-20 10 10 0 000 20z"/><path d="M15 9l-6 6"/><path d="M9 9l6 6"/></svg></span>
    <span style="flex:1; font-size:13px; color: var(--ds-fg-1);">Failed to assign — try again</span>
    <button style="background:none; border:none; color: var(--ds-accent-1); font-size:12px; font-weight:500; cursor:pointer;">Retry</button>
    <span style="color: var(--ds-fg-4); display:inline-flex; cursor:pointer;"><svg class="ico" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M6 18L18 6"/><path d="M6 6l12 12"/></svg></span>
  </div>
  <div style="font-size:11px; color: var(--ds-fg-3); font-family: var(--ds-font-mono);">toast · bottom-right · auto-dismiss 5s · action + close</div>
</div>
</body>
</html>
