<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<title>Avatars</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body {
    background: var(--ds-bg-1);
    padding: 20px;
    box-sizing: border-box;
    color: var(--ds-fg-1);
    font-family: var(--ds-font-sans);
  }
  *, *::before, *::after { box-sizing: border-box; }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .swatch {
    border-radius: var(--ds-radius-sm);
    border: 1px solid var(--ds-border-1);
    overflow: hidden;
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    height: 88px;
  }
  .swatch .lbl {
    padding: 6px 8px;
    font-family: var(--ds-font-mono);
    font-size: 10px;
    color: var(--ds-fg-1);
    background: rgba(15,23,42,0.55);
    backdrop-filter: blur(4px);
    display: flex;
    justify-content: space-between;
    line-height: 1.3;
  }
  [data-theme="light"] .swatch .lbl { background: rgba(255,255,255,0.7); color: var(--ds-fg-1); border-top: 1px solid var(--ds-border-1); }
  .scale { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; }
</style>
</head>
<body>

<div style="display:flex; gap: 14px; align-items: center;">

    <div style="width: 28px; height: 28px; background: #3B6FF6; color: #FFF; border-radius: 999px; display:inline-flex; align-items: center; justify-content: center; font-family: var(--ds-font-mono); font-size: 11px; font-weight: 600; border: 1px solid var(--ds-bg-1);">JC</div>
    <div style="width: 28px; height: 28px; background: #14B8A6; color: #FFF; border-radius: 999px; display:inline-flex; align-items: center; justify-content: center; font-family: var(--ds-font-mono); font-size: 11px; font-weight: 600; border: 1px solid var(--ds-bg-1);">SK</div>
    <div style="width: 28px; height: 28px; background: #8B5CF6; color: #FFF; border-radius: 999px; display:inline-flex; align-items: center; justify-content: center; font-family: var(--ds-font-mono); font-size: 11px; font-weight: 600; border: 1px solid var(--ds-bg-1);">HP</div>
    <div style="width: 28px; height: 28px; background: #F97316; color: #FFF; border-radius: 999px; display:inline-flex; align-items: center; justify-content: center; font-family: var(--ds-font-mono); font-size: 11px; font-weight: 600; border: 1px solid var(--ds-bg-1);">MK</div>
    <div style="width: 28px; height: 28px; background: #EC4899; color: #FFF; border-radius: 999px; display:inline-flex; align-items: center; justify-content: center; font-family: var(--ds-font-mono); font-size: 11px; font-weight: 600; border: 1px solid var(--ds-bg-1);">LL</div>
  <div style="display:flex; align-items:center; margin-left: 8px;">

      <div style="width: 24px; height: 24px; background: #3B6FF6; color: #FFF; border-radius: 999px; display:inline-flex; align-items: center; justify-content: center; font-family: var(--ds-font-mono); font-size: 10px; font-weight: 600; border: 2px solid var(--ds-bg-1); margin-left: -8px;">JC</div>
      <div style="width: 24px; height: 24px; background: #14B8A6; color: #FFF; border-radius: 999px; display:inline-flex; align-items: center; justify-content: center; font-family: var(--ds-font-mono); font-size: 10px; font-weight: 600; border: 2px solid var(--ds-bg-1); margin-left: -8px;">SK</div>
      <div style="width: 24px; height: 24px; background: #8B5CF6; color: #FFF; border-radius: 999px; display:inline-flex; align-items: center; justify-content: center; font-family: var(--ds-font-mono); font-size: 10px; font-weight: 600; border: 2px solid var(--ds-bg-1); margin-left: -8px;">HP</div>
      <div style="width: 24px; height: 24px; background: var(--ds-bg-3); color: var(--ds-fg-2); border-radius: 999px; display:inline-flex; align-items: center; justify-content: center; font-family: var(--ds-font-mono); font-size: 10px; font-weight: 600; border: 2px solid var(--ds-bg-1); margin-left: -8px;">+12</div>
  </div>
  <span style="font-family: var(--ds-font-mono); font-size: 10px; color: var(--ds-fg-3); margin-left: auto;">28px · stack · +N overflow</span>
</div>

</body>
</html>
