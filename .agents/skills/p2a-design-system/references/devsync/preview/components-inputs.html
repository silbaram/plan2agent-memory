<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<title>Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body {
    background: var(--ds-bg-1);
    padding: 20px;
    box-sizing: border-box;
    color: var(--ds-fg-1);
    font-family: var(--ds-font-sans);
  }
  *, *::before, *::after { box-sizing: border-box; }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .swatch {
    border-radius: var(--ds-radius-sm);
    border: 1px solid var(--ds-border-1);
    overflow: hidden;
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    height: 88px;
  }
  .swatch .lbl {
    padding: 6px 8px;
    font-family: var(--ds-font-mono);
    font-size: 10px;
    color: var(--ds-fg-1);
    background: rgba(15,23,42,0.55);
    backdrop-filter: blur(4px);
    display: flex;
    justify-content: space-between;
    line-height: 1.3;
  }
  [data-theme="light"] .swatch .lbl { background: rgba(255,255,255,0.7); color: var(--ds-fg-1); border-top: 1px solid var(--ds-border-1); }
  .scale { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; }
</style>
</head>
<body>

<div style="display:grid; grid-template-columns: 1fr 1fr; gap: 12px;">
  <div style="display:flex; flex-direction: column; gap: 4px;">
    <div class="ds-label" style="font-size: 10px;">BRANCH</div>
    <input value="feat/auth-flow" style="height: 28px; padding: 0 10px; background: var(--ds-bg-2); border: 1px solid var(--ds-border-2); border-radius: var(--ds-radius-sm); color: var(--ds-fg-1); font-family: var(--ds-font-mono); font-size: 12px; outline: none;" />
  </div>
  <div style="display:flex; flex-direction: column; gap: 4px;">
    <div class="ds-label" style="font-size: 10px;">FOCUSED</div>
    <input value="main" style="height: 28px; padding: 0 10px; background: var(--ds-bg-2); border: 1px solid var(--ds-accent-1); border-radius: var(--ds-radius-sm); color: var(--ds-fg-1); font-family: var(--ds-font-mono); font-size: 12px; outline: none; box-shadow: var(--ds-shadow-focus);" />
  </div>
  <div style="display:flex; flex-direction: column; gap: 4px;">
    <div class="ds-label" style="font-size: 10px;">SELECT</div>
    <div style="height: 28px; padding: 0 10px; background: var(--ds-bg-2); border: 1px solid var(--ds-border-2); border-radius: var(--ds-radius-sm); color: var(--ds-fg-1); font-size: 12px; display:flex; align-items:center; justify-content: space-between;">
      <span>Engineering · backend</span>
      <span style="color: var(--ds-fg-3); font-size: 10px;">▾</span>
    </div>
  </div>
  <div style="display:flex; flex-direction: column; gap: 4px;">
    <div class="ds-label" style="font-size: 10px;">ERROR</div>
    <input value="invalid-token" style="height: 28px; padding: 0 10px; background: var(--ds-bg-2); border: 1px solid var(--ds-danger-1); border-radius: var(--ds-radius-sm); color: var(--ds-fg-1); font-family: var(--ds-font-mono); font-size: 12px; outline: none;" />
  </div>
</div>

</body>
</html>
