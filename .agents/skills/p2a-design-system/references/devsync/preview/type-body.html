<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<title>Body & labels</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body {
    background: var(--ds-bg-1);
    padding: 20px;
    box-sizing: border-box;
    color: var(--ds-fg-1);
    font-family: var(--ds-font-sans);
  }
  *, *::before, *::after { box-sizing: border-box; }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .swatch {
    border-radius: var(--ds-radius-sm);
    border: 1px solid var(--ds-border-1);
    overflow: hidden;
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    height: 88px;
  }
  .swatch .lbl {
    padding: 6px 8px;
    font-family: var(--ds-font-mono);
    font-size: 10px;
    color: var(--ds-fg-1);
    background: rgba(15,23,42,0.55);
    backdrop-filter: blur(4px);
    display: flex;
    justify-content: space-between;
    line-height: 1.3;
  }
  [data-theme="light"] .swatch .lbl { background: rgba(255,255,255,0.7); color: var(--ds-fg-1); border-top: 1px solid var(--ds-border-1); }
  .scale { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; }
</style>
</head>
<body>

<div style="display:flex; flex-direction: column; gap: 10px;">
  <div style="display:flex; align-items: baseline; gap: 16px;">
    <div class="ds-h4">Heading 4 · panel title</div>
    <span style="font-family: var(--ds-font-mono); font-size: 10px; color: var(--ds-fg-3);">16 / 600</span>
  </div>
  <div style="display:flex; align-items: baseline; gap: 16px;">
    <div class="ds-body">Body · default product text at 13px, optimised for long reading sessions.</div>
    <span style="font-family: var(--ds-font-mono); font-size: 10px; color: var(--ds-fg-3);">13 / 400</span>
  </div>
  <div style="display:flex; align-items: baseline; gap: 16px;">
    <div class="ds-body-sm">Body small · secondary description text</div>
    <span style="font-family: var(--ds-font-mono); font-size: 10px; color: var(--ds-fg-3);">12 / 400</span>
  </div>
  <div style="display:flex; align-items: baseline; gap: 16px;">
    <div class="ds-meta">Meta · timestamp · 2m ago</div>
    <span style="font-family: var(--ds-font-mono); font-size: 10px; color: var(--ds-fg-3);">12 / 400 / fg-3</span>
  </div>
  <div style="display:flex; align-items: baseline; gap: 16px;">
    <div class="ds-label">SECTION LABEL</div>
    <span style="font-family: var(--ds-font-mono); font-size: 10px; color: var(--ds-fg-3);">11 / 600 / +0.04em</span>
  </div>
</div>

</body>
</html>
