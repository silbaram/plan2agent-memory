<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<title>Inline alerts</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: var(--ds-bg-1); padding: 20px; box-sizing: border-box; color: var(--ds-fg-1); font-family: var(--ds-font-sans); }
  *, *::before, *::after { box-sizing: border-box; }
  .ico { width:16px;height:16px;flex-shrink:0; }
  .kbd { font-family: var(--ds-font-mono); font-size: 10px; background: var(--ds-bg-2); border: 1px solid var(--ds-border-2); border-radius: var(--ds-radius-xs); padding: 1px 5px; color: var(--ds-fg-3); }
</style>
</head>
<body>
<div style="display:flex; flex-direction:column; gap:8px;">

  <div style="display:flex; gap:10px; padding:10px 12px; background: var(--ds-success-bg); border:1px solid var(--ds-success-border); border-radius: var(--ds-radius-md);">
    <span style="color: var(--ds-success-1); display:inline-flex; flex-shrink:0; margin-top:1px;"><svg class="ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22a10 10 0 100-20 10 10 0 000 20z"/><path d="M9 12l2 2 4-4"/></svg></span>
    <div style="flex:1; min-width:0;">
      <div style="font-size:13px; font-weight:600; color: var(--ds-success-fg); line-height:1.3;">Merged into main</div>
      <div style="font-size:12px; color: var(--ds-fg-2); margin-top:2px; line-height:1.4;">feat/auth-token-refresh · a3f9c12</div>
    </div>
  </div>

  <div style="display:flex; gap:10px; padding:10px 12px; background: var(--ds-warning-bg); border:1px solid var(--ds-warning-border); border-radius: var(--ds-radius-md);">
    <span style="color: var(--ds-warning-1); display:inline-flex; flex-shrink:0; margin-top:1px;"><svg class="ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg></span>
    <div style="flex:1; min-width:0;">
      <div style="font-size:13px; font-weight:600; color: var(--ds-warning-fg); line-height:1.3;">Branch protection</div>
      <div style="font-size:12px; color: var(--ds-fg-2); margin-top:2px; line-height:1.4;">Push rejected — requires 1 approving review.</div>
    </div>
  </div>

  <div style="display:flex; gap:10px; padding:10px 12px; background: var(--ds-danger-bg); border:1px solid var(--ds-danger-border); border-radius: var(--ds-radius-md);">
    <span style="color: var(--ds-danger-1); display:inline-flex; flex-shrink:0; margin-top:1px;"><svg class="ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22a10 10 0 100-20 10 10 0 000 20z"/><path d="M15 9l-6 6"/><path d="M9 9l6 6"/></svg></span>
    <div style="flex:1; min-width:0;">
      <div style="font-size:13px; font-weight:600; color: var(--ds-danger-fg); line-height:1.3;">Build failed</div>
      <div style="font-size:12px; color: var(--ds-fg-2); margin-top:2px; line-height:1.4;">web-e2e · macos-14 failed after 4m 12s</div>
    </div>
  </div>

  <div style="display:flex; gap:10px; padding:10px 12px; background: var(--ds-info-bg); border:1px solid var(--ds-info-border); border-radius: var(--ds-radius-md);">
    <span style="color: var(--ds-info-1); display:inline-flex; flex-shrink:0; margin-top:1px;"><svg class="ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22a10 10 0 100-20 10 10 0 000 20z"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg></span>
    <div style="flex:1; min-width:0;">
      <div style="font-size:13px; font-weight:600; color: var(--ds-info-fg); line-height:1.3;">Sync in progress</div>
      <div style="font-size:12px; color: var(--ds-fg-2); margin-top:2px; line-height:1.4;">Indexing 12,480 files from origin/main.</div>
    </div>
  </div>
</div>
</body>
</html>
