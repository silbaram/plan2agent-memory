<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<title>Badges</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body {
    background: var(--ds-bg-1);
    padding: 20px;
    box-sizing: border-box;
    color: var(--ds-fg-1);
    font-family: var(--ds-font-sans);
  }
  *, *::before, *::after { box-sizing: border-box; }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .swatch {
    border-radius: var(--ds-radius-sm);
    border: 1px solid var(--ds-border-1);
    overflow: hidden;
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    height: 88px;
  }
  .swatch .lbl {
    padding: 6px 8px;
    font-family: var(--ds-font-mono);
    font-size: 10px;
    color: var(--ds-fg-1);
    background: rgba(15,23,42,0.55);
    backdrop-filter: blur(4px);
    display: flex;
    justify-content: space-between;
    line-height: 1.3;
  }
  [data-theme="light"] .swatch .lbl { background: rgba(255,255,255,0.7); color: var(--ds-fg-1); border-top: 1px solid var(--ds-border-1); }
  .scale { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; }
</style>
</head>
<body>

<div style="display:flex; flex-direction: column; gap: 10px;">
  <div style="display:flex; gap: 8px; align-items: center; flex-wrap: wrap;">

      <span style="display:inline-flex; align-items:center; gap:6px; height: 22px; padding: 0 8px; background: var(--ds-success-bg); border: 1px solid var(--ds-success-border); color: var(--ds-success-fg); border-radius: var(--ds-radius-sm); font-size: 11px; font-weight: 500; font-family: var(--ds-font-sans);">
        <span style="width:6px; height:6px; border-radius:999px; background:var(--ds-success-1);"></span>Open
      </span>
      <span style="display:inline-flex; align-items:center; gap:6px; height: 22px; padding: 0 8px; background: var(--ds-info-bg); border: 1px solid var(--ds-info-border); color: var(--ds-info-fg); border-radius: var(--ds-radius-sm); font-size: 11px; font-weight: 500; font-family: var(--ds-font-sans);">
        <span style="width:6px; height:6px; border-radius:999px; background:var(--ds-info-1);"></span>In review
      </span>
      <span style="display:inline-flex; align-items:center; gap:6px; height: 22px; padding: 0 8px; background: var(--ds-warning-bg); border: 1px solid var(--ds-warning-border); color: var(--ds-warning-fg); border-radius: var(--ds-radius-sm); font-size: 11px; font-weight: 500; font-family: var(--ds-font-sans);">
        <span style="width:6px; height:6px; border-radius:999px; background:var(--ds-warning-1);"></span>Blocked
      </span>
      <span style="display:inline-flex; align-items:center; gap:6px; height: 22px; padding: 0 8px; background: var(--ds-danger-bg); border: 1px solid var(--ds-danger-border); color: var(--ds-danger-fg); border-radius: var(--ds-radius-sm); font-size: 11px; font-weight: 500; font-family: var(--ds-font-sans);">
        <span style="width:6px; height:6px; border-radius:999px; background:var(--ds-danger-1);"></span>Failed
      </span>
      <span style="display:inline-flex; align-items:center; gap:6px; height: 22px; padding: 0 8px; background: var(--ds-bg-3); border: 1px solid var(--ds-border-2); color: var(--ds-fg-2); border-radius: var(--ds-radius-sm); font-size: 11px; font-weight: 500; font-family: var(--ds-font-sans);">
        <span style="width:6px; height:6px; border-radius:999px; background:var(--ds-fg-3);"></span>Draft
      </span>
  </div>
  <div style="display:flex; gap: 8px; align-items: center; flex-wrap: wrap;">
    <span style="display:inline-flex; align-items:center; gap:4px; height: 18px; padding: 0 6px; background: var(--ds-bg-3); border: 1px solid var(--ds-border-1); color: var(--ds-fg-2); border-radius: var(--ds-radius-xs); font-family: var(--ds-font-mono); font-size: 10px;">P1</span>
    <span style="display:inline-flex; align-items:center; gap:4px; height: 18px; padding: 0 6px; background: var(--ds-bg-3); border: 1px solid var(--ds-border-1); color: var(--ds-fg-2); border-radius: var(--ds-radius-xs); font-family: var(--ds-font-mono); font-size: 10px;">+5</span>
    <span style="display:inline-flex; align-items:center; gap:4px; height: 18px; padding: 0 6px; background: var(--ds-bg-3); border: 1px solid var(--ds-border-1); color: var(--ds-fg-2); border-radius: var(--ds-radius-xs); font-family: var(--ds-font-mono); font-size: 10px;">api</span>
    <span style="display:inline-flex; align-items:center; gap:4px; height: 18px; padding: 0 6px; background: var(--ds-bg-3); border: 1px solid var(--ds-border-1); color: var(--ds-fg-2); border-radius: var(--ds-radius-xs); font-family: var(--ds-font-mono); font-size: 10px;">infra</span>
    <span style="margin-left: 6px; font-family: var(--ds-font-mono); font-size: 10px; color: var(--ds-fg-3);">tags · counts</span>
  </div>
</div>

</body>
</html>
