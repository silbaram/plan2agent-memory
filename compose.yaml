services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: p2a-artifact-store-postgres
    environment:
      POSTGRES_DB: p2a_artifact_store
      POSTGRES_USER: p2a
      POSTGRES_PASSWORD: p2a_local_password
    ports:
      - "5432:5432"
    volumes:
      - p2a-artifact-store-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U p2a -d p2a_artifact_store"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  p2a-artifact-store-postgres-data:

