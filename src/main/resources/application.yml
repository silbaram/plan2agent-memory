spring:
  application:
    name: plan2agent-memory
  datasource:
    url: ${P2A_DB_URL:jdbc:postgresql://localhost:5432/p2a_artifact_store}
    username: ${P2A_DB_USERNAME:p2a}
    password: ${P2A_DB_PASSWORD:p2a_local_password}
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

p2a:
  security:
    header-name: ${P2A_LOCAL_TOKEN_HEADER:X-P2A-Local-Token}
    token: ${P2A_LOCAL_TOKEN:}
    protected-paths:
      - /api/**
    excluded-paths:
      - /api/health
      - /actuator/health

server:
  port: ${PORT:8080}
